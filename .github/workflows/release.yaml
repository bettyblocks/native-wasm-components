name: Release WASM Components to Betty Blocks

on:
  push:
    branches: ["main", "acceptance", "edge"]

jobs:
  build:
    runs-on: ubuntu-24.04
    environment: ${{ github.ref_name }}
    env:
      npm_token: ${{ secrets.NPM_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - pair:
              elixir: 1.18.4
              otp: 27.3.4
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
          # generated by `find . -type d -name "target"`
          cache-directories: |
            ./functions/reassign-variable/1.0/target
            ./functions/parse-json/1.0/target
            ./functions/send-mail/1.0/target
            ./functions/delete/1.0/target
            ./functions/init-array/1.0/target
            ./functions/stringify/1.0/target
            ./functions/create-object/1.0/target
            ./functions/add-variable-to-array/1.0/target
            ./functions/expression/1.0/target
            ./functions/update/1.0/target
            ./functions/upsert/1.0/target
            ./functions/create/1.0/target
            ./functions/logging/1.0/target
            ./functions/http/1.0/target
            ./functions/store-file/1.0/target
      - name: Cache Elixir
        uses: actions/cache@v4
        with:
          path: |
            _build
            deps
          key: ${{ runner.os }}-elixir-${{ hashFiles('mix.lock') }}
      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          targets: wasm32-wasip2

      - uses: taiki-e/install-action@v2
        with:
          tool: just,wkg,wash

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{matrix.pair.otp}}
          elixir-version: ${{matrix.pair.elixir}}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install npm dependencies
        run: bun install --frozen-lockfile

      - name: Build wasm components
        run: mix build

      - name: Upload wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-components
          path: functions/*/*/*.wasm

  push-ghcr:
    needs: [build]
    runs-on: ubuntu-24.04
    environment: ${{ github.ref_name }}
    env:
      npm_token: ${{ secrets.NPM_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install npm dependencies
        run: bun install --frozen-lockfile

      - name: Download wasm artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-components
          path: functions

      - name: Publish to Betty Blocks
        run: bun run publish.ts ${{ secrets.BLOCKSTORE_CLI_SECRET }} ${{ github.ref_name }}

  push-azure:
    needs: [build]
    if: always() && needs.build.result == 'success' && (github.ref_name == 'edge' || github.ref_name == 'main')
    runs-on: ubuntu-24.04
    environment: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/install-action@v2
        with:
          tool: wkg

      - name: Download wasm artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-components
          path: functions

      - name: Log in to Azure registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY }}
          username: ${{ secrets.AZURE_USERNAME }}
          password: ${{ secrets.AZURE_PASSWORD }}

      - name: Push all components to Azure registry
        run: |
          for MANIFEST in functions/*/*/Cargo.toml; do
            COMPONENT_DIRECTORY=$(dirname "$MANIFEST")
            PACKAGE_REGISTRY_PATH="${{ secrets.AZURE_REGISTRY }}/$(sed -nE '1s/package betty-blocks:([a-z0-9-]+)@([0-9]+\.[0-9]+\.[0-9]+);/betty-blocks\/\1:\2/p' "$COMPONENT_DIRECTORY/wit/world.wit")"
            wkg oci push "$PACKAGE_REGISTRY_PATH" "$COMPONENT_DIRECTORY/"*.wasm
          done
